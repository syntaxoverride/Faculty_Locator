<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faculty Presence Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121933;
      --panel-alt: #182142;
      --text: #edf2ff;
      --muted: #9fb0d6;
      --accent: #7cc7ff;
      --ok: #4dd4a0;
      --warn: #ffc857;
      --danger: #ff7b7b;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #08101f 0%, #101735 100%);
      color: var(--text);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1, h2 {
      margin: 0;
    }

    p {
      color: var(--muted);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 24px;
    }

    .timestamp {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(14px);
    }

    .rooms {
      display: grid;
      gap: 16px;
    }

    .room-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .room-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.06);
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .status.online::before {
      background: var(--ok);
    }

    .status.offline::before {
      background: var(--danger);
    }

    .faculty-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .faculty-chip {
      min-width: 160px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .faculty-chip strong {
      display: block;
      margin-bottom: 4px;
    }

    .chip-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .table th,
    .table td {
      text-align: left;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Faculty Presence Dashboard</h1>
        <p>Live room presence driven by BLE badge sightings and MQTT events.</p>
      </div>
      <div class="timestamp" id="generated-at">Waiting for data...</div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Rooms</h2>
        <div class="rooms" id="rooms"></div>
      </div>

      <div class="panel">
        <h2>Faculty Overview</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Room</th>
            </tr>
          </thead>
          <tbody id="faculty-table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function formatTimestamp(timestamp) {
      if (!timestamp) return "No data yet";
      return new Date(timestamp).toLocaleString();
    }

    function scannerStatusClass(status) {
      if (status === "online") return "status online";
      if (status === "offline") return "status offline";
      return "status";
    }

    function renderRooms(rooms) {
      const container = document.getElementById("rooms");
      if (!rooms.length) {
        container.innerHTML = '<p class="empty">No room data yet. Start the simulator or scanner.</p>';
        return;
      }

      container.innerHTML = rooms.map(room => {
        const faculty = room.present_faculty || [];
        const facultyHtml = faculty.length
          ? `<div class="faculty-list">${faculty.map(person => `
              <div class="faculty-chip">
                <strong>${person.display_name}</strong>
                <div class="chip-meta">RSSI ${person.rssi ?? 0} dBm</div>
              </div>
            `).join("")}</div>`
          : '<p class="empty">No faculty currently marked present.</p>';

        return `
          <article class="room-card">
            <div class="room-header">
              <div>
                <h3>${room.room_name}</h3>
                <div class="room-meta">${room.room_id}</div>
              </div>
              <div class="${scannerStatusClass(room.scanner.status)}">
                ${room.scanner.status || "unknown"}
              </div>
            </div>
            <div class="room-meta">
              Scanner IP: ${room.scanner.ip || "unknown"}<br>
              Last event: ${formatTimestamp(room.scanner.last_seen)}
            </div>
            <div style="margin-top: 14px;">
              ${facultyHtml}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderFaculty(faculty) {
      const body = document.getElementById("faculty-table");
      if (!faculty.length) {
        body.innerHTML = '<tr><td colspan="2" class="empty">No presence events yet.</td></tr>';
        return;
      }

      body.innerHTML = faculty.map(person => `
        <tr>
          <td>${person.display_name}</td>
          <td>${person.present ? person.room_name : "Not present"}</td>
        </tr>
      `).join("");
    }

    async function refresh() {
      const response = await fetch("/api/state");
      const data = await response.json();
      document.getElementById("generated-at").textContent = `Updated ${formatTimestamp(data.generated_at)}`;
      renderRooms(data.rooms || []);
      renderFaculty(data.faculty || []);
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
