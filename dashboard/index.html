<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faculty Presence Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121933;
      --panel-alt: #182142;
      --text: #edf2ff;
      --muted: #9fb0d6;
      --accent: #7cc7ff;
      --ok: #4dd4a0;
      --warn: #ffc857;
      --danger: #ff7b7b;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #08101f 0%, #101735 100%);
      color: var(--text);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1, h2 {
      margin: 0;
    }

    p {
      color: var(--muted);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 24px;
    }

    .timestamp {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(14px);
    }

    .rooms {
      display: grid;
      gap: 16px;
    }

    .room-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .room-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.06);
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .status.online::before {
      background: var(--ok);
    }

    .status.offline::before {
      background: var(--danger);
    }

    .faculty-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .faculty-chip {
      min-width: 160px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      animation: chip-appear 0.4s ease-out;
    }

    @keyframes chip-appear {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(-4px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .room-card.updated {
      animation: room-pulse 0.6s ease-out;
    }

    @keyframes room-pulse {
      0%, 100% { border-color: var(--border); }
      50% { border-color: var(--accent); }
    }

    .faculty-chip strong {
      display: block;
      margin-bottom: 4px;
    }

    .chip-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .table th,
    .table td {
      text-align: left;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(77, 212, 160, 0.2);
      color: var(--ok);
    }

    .live-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
      animation: live-pulse 2s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Faculty Presence Dashboard</h1>
        <p>Live room presence driven by BLE badge sightings and MQTT events.</p>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <span class="live-badge" id="live-badge">Live</span>
        <span class="timestamp" id="generated-at">Connecting...</span>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Rooms</h2>
        <div class="rooms" id="rooms"></div>
      </div>

      <div class="panel">
        <h2>Faculty Overview</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Room</th>
            </tr>
          </thead>
          <tbody id="faculty-table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function formatTimestamp(timestamp) {
      if (!timestamp) return "No data yet";
      return new Date(timestamp).toLocaleString();
    }

    function scannerStatusClass(status) {
      if (status === "online") return "status online";
      if (status === "offline") return "status offline";
      return "status";
    }

    function facultyKey(room) {
      return (room.present_faculty || []).map(p => p.faculty_id).sort().join(",");
    }

    function renderRooms(rooms, prevRoomFaculty) {
      const container = document.getElementById("rooms");
      if (!rooms.length) {
        container.innerHTML = '<p class="empty">No room data yet. Start the simulator or scanner.</p>';
        return;
      }

      const hasRenderedBefore = prevRoomFaculty && Object.keys(prevRoomFaculty).length > 0;

      container.innerHTML = rooms.map(room => {
        const faculty = room.present_faculty || [];
        const prevKey = prevRoomFaculty && prevRoomFaculty[room.room_id];
        const currKey = facultyKey(room);
        const justUpdated = hasRenderedBefore && prevKey !== undefined && prevKey !== currKey;

        const facultyHtml = faculty.length
          ? `<div class="faculty-list">${faculty.map(person => `
              <div class="faculty-chip">
                <strong>${person.display_name}</strong>
                <div class="chip-meta">RSSI ${person.rssi ?? 0} dBm</div>
              </div>
            `).join("")}</div>`
          : '<p class="empty">No faculty currently marked present.</p>';

        return `
          <article class="room-card${justUpdated ? " updated" : ""}" data-room-id="${room.room_id}">
            <div class="room-header">
              <div>
                <h3>${room.room_name}</h3>
                <div class="room-meta">${room.room_id}</div>
              </div>
              <div class="${scannerStatusClass(room.scanner.status)}">
                ${room.scanner.status || "unknown"}
              </div>
            </div>
            <div class="room-meta">
              Scanner IP: ${room.scanner.ip || "unknown"}<br>
              Last event: ${formatTimestamp(room.scanner.last_seen)}
            </div>
            <div style="margin-top: 14px;">
              ${facultyHtml}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderFaculty(faculty) {
      const body = document.getElementById("faculty-table");
      if (!faculty.length) {
        body.innerHTML = '<tr><td colspan="2" class="empty">No presence events yet.</td></tr>';
        return;
      }

      body.innerHTML = faculty.map(person => `
        <tr>
          <td>${person.display_name}</td>
          <td>${person.present ? person.room_name : "Not present"}</td>
        </tr>
      `).join("");
    }

    function applyState(data) {
      const prevRoomFaculty = window._prevRoomFaculty || {};
      window._prevRoomFaculty = Object.fromEntries(
        (data.rooms || []).map(r => [r.room_id, facultyKey(r)])
      );

      document.getElementById("generated-at").textContent = `Updated ${formatTimestamp(data.generated_at)}`;
      renderRooms(data.rooms || [], prevRoomFaculty);
      renderFaculty(data.faculty || []);
    }

    function connectSSE() {
      const es = new EventSource("/api/events");
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          applyState(data);
          document.getElementById("live-badge").textContent = "Live";
        } catch (err) {
          console.warn("SSE parse error:", err);
        }
      };
      es.onerror = () => {
        document.getElementById("live-badge").textContent = "Reconnecting…";
        es.close();
        setTimeout(connectSSE, 2000);
      };
    }

    // Fallback: fetch once, then try SSE
    fetch("/api/state")
      .then(r => r.json())
      .then(applyState)
      .catch(() => { document.getElementById("generated-at").textContent = "Failed to load"; });

    connectSSE();
  </script>
</body>
</html>
